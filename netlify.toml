# Netlify 部署設定檔
# 詳細文件：https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."
  functions = "netlify/functions"

# 確保 Functions 使用較新的 Node 版本（支援 export default 語法）
[functions]
  node_bundler = "esbuild"

[functions."*"]
  # 預設 timeout 10 秒就夠了
  included_files = []
