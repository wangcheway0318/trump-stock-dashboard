<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日資訊看板 — Trump x 台股</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        bg: '#0b0f1a', panel: '#131826', border: '#1f2937',
        accent: '#3b82f6', up: '#ef4444', down: '#10b981',
      }}},
    };
  </script>
  <style>
    body { background: #0b0f1a; }
    .pulse-dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; box-shadow: 0 0 0 0 rgba(16,185,129,.7); animation: pulse 2s infinite; }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(16,185,129,.7); }
      70% { box-shadow: 0 0 0 10px rgba(16,185,129,0); }
      100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
    }
    .scroll-area { scrollbar-width: thin; scrollbar-color: #374151 transparent; }
    .scroll-area::-webkit-scrollbar { width: 6px; }
    .scroll-area::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    .skeleton { background: linear-gradient(90deg, #1f2937 0%, #2a3447 50%, #1f2937 100%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .stock-link { cursor: pointer; }
    .stock-link:hover { color: #60a5fa; text-decoration: underline; }
    .modal-backdrop { background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); }
    .alert-glow { animation: glow 2s ease-in-out infinite; box-shadow: 0 0 0 0 rgba(239,68,68,0.5); }
    @keyframes glow {
      0%,100% { box-shadow: 0 0 12px 2px rgba(239,68,68,0.4); }
      50% { box-shadow: 0 0 20px 6px rgba(239,68,68,0.7); }
    }
    .search-results { max-height: 400px; }
  </style>
</head>
<body class="text-gray-100 font-sans min-h-screen">

  <!-- ============== HEADER ============== -->
  <header class="border-b border-border bg-panel/80 backdrop-blur sticky top-0 z-30">
    <div class="max-w-screen-2xl mx-auto px-4 py-3">
      <!-- Row 1: 標題 + 狀態 -->
      <div class="flex items-center justify-between gap-3 mb-2">
        <div class="flex items-center gap-3 min-w-0">
          <span class="text-2xl">📊</span>
          <div class="min-w-0">
            <h1 class="text-base sm:text-lg font-bold leading-tight">每日資訊看板</h1>
            <p class="text-xs text-gray-400 hidden sm:block">Trump · 台股大盤 · 即時新聞</p>
          </div>
        </div>
        <div class="flex items-center gap-3 text-xs sm:text-sm shrink-0">
          <div class="flex items-center gap-1.5">
            <span id="market-dot" class="pulse-dot"></span>
            <span id="market-status" class="text-gray-300">載入中</span>
          </div>
          <span id="clock" class="text-gray-400 font-mono tabular-nums hidden sm:inline"></span>
        </div>
      </div>

      <!-- Row 2: 市場時間軸進度線 -->
      <div class="mb-2 flex items-center gap-2 text-[10px] sm:text-xs">
        <span class="text-gray-500 font-mono shrink-0">09:00</span>
        <div class="relative flex-1 h-1.5 bg-bg/80 rounded-full overflow-hidden">
          <div id="timeline-pre" class="absolute inset-y-0 left-0 bg-gray-700/50 rounded-l-full" style="width: 0%"></div>
          <div id="timeline-progress" class="absolute inset-y-0 bg-emerald-500/60 transition-all duration-1000" style="left: 0%; width: 0%"></div>
          <div id="timeline-post" class="absolute inset-y-0 right-0 bg-gray-700/30 rounded-r-full" style="width: 0%"></div>
        </div>
        <span class="text-gray-500 font-mono shrink-0">13:30</span>
        <span id="timeline-status" class="text-gray-400 shrink-0 min-w-16 text-right font-medium">—</span>
      </div>

      <!-- Row 3: 兩個搜尋欄 -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <!-- 術語搜尋 -->
        <div class="relative">
          <div class="flex items-center bg-bg/80 border border-border rounded-lg px-3 py-2 focus-within:border-accent">
            <span class="text-gray-500 text-sm mr-2">📖</span>
            <input id="term-search" type="text" autocomplete="off" placeholder="搜尋股市術語（如「KD」「殖利率」）"
              class="flex-1 bg-transparent text-sm focus:outline-none placeholder-gray-500" />
          </div>
          <div id="term-results" class="hidden absolute left-0 right-0 mt-1 bg-panel border border-border rounded-lg shadow-2xl overflow-y-auto search-results scroll-area z-40"></div>
        </div>
        <!-- 股票搜尋 -->
        <div class="relative">
          <div class="flex items-center bg-bg/80 border border-border rounded-lg px-3 py-2 focus-within:border-accent">
            <span class="text-gray-500 text-sm mr-2">🔍</span>
            <input id="stock-search" type="text" autocomplete="off" placeholder="搜尋股票或 ETF（代號或名稱）"
              class="flex-1 bg-transparent text-sm focus:outline-none placeholder-gray-500" />
          </div>
          <div id="stock-results" class="hidden absolute left-0 right-0 mt-1 bg-panel border border-border rounded-lg shadow-2xl overflow-y-auto search-results scroll-area z-40"></div>
        </div>
      </div>
    </div>

    <!-- Row 3: Mobile tabs -->
    <nav class="md:hidden border-t border-border flex">
      <button data-tab="trump" class="tab-btn flex-1 py-2 text-sm font-medium border-b-2 border-accent text-accent">Trump</button>
      <button data-tab="market" class="tab-btn flex-1 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400">大盤</button>
      <button data-tab="news" class="tab-btn flex-1 py-2 text-sm font-medium border-b-2 border-transparent text-gray-400">新聞</button>
    </nav>
  </header>

  <!-- ============== MAIN ============== -->
  <main class="max-w-screen-2xl mx-auto px-3 sm:px-4 py-4">
    <div class="grid md:grid-cols-3 gap-4">

      <!-- Trump panel -->
      <section data-panel="trump" class="panel bg-panel rounded-xl border border-border overflow-hidden flex flex-col" style="height: calc(100vh - 220px); min-height: 500px;">
        <div class="px-4 py-3 border-b border-border flex items-center justify-between gap-2">
          <div class="flex items-center gap-2">
            <span class="text-lg">🇺🇸</span>
            <h2 class="font-semibold">Trump · Truth Social</h2>
          </div>
          <div class="flex items-center gap-2">
            <label class="flex items-center gap-1 text-[11px] text-gray-400 cursor-pointer">
              <input id="trans-toggle" type="checkbox" checked class="accent-accent" />中文
            </label>
            <span id="trump-updated" class="text-[10px] text-gray-500"></span>
          </div>
        </div>
        <div id="trump-feed" class="flex-1 overflow-y-auto scroll-area p-3 space-y-3">
          <div class="skeleton h-24 rounded-lg"></div>
          <div class="skeleton h-32 rounded-lg"></div>
        </div>
      </section>

      <!-- Market overview panel -->
      <section data-panel="market" class="panel hidden md:flex bg-panel rounded-xl border border-border overflow-hidden flex-col" style="height: calc(100vh - 220px); min-height: 500px;">
        <div class="px-4 py-3 border-b border-border flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="text-lg">📈</span>
            <h2 class="font-semibold">台股大盤資訊</h2>
          </div>
          <span id="market-updated" class="text-[10px] text-gray-500"></span>
        </div>
        <div id="market-content" class="flex-1 overflow-y-auto scroll-area p-3 space-y-4">
          <div class="skeleton h-24 rounded-lg"></div>
          <div class="skeleton h-40 rounded-lg"></div>
          <div class="skeleton h-40 rounded-lg"></div>
        </div>
      </section>

      <!-- News panel -->
      <section data-panel="news" class="panel hidden md:flex bg-panel rounded-xl border border-border overflow-hidden flex-col" style="height: calc(100vh - 220px); min-height: 500px;">
        <div class="px-4 py-3 border-b border-border flex items-center justify-between">
          <div class="flex items-center gap-2">
            <span class="text-lg">📰</span>
            <h2 class="font-semibold">台股新聞</h2>
          </div>
          <span id="news-updated" class="text-[10px] text-gray-500"></span>
        </div>
        <div id="news-feed" class="flex-1 overflow-y-auto scroll-area p-3 space-y-2">
          <div class="skeleton h-16 rounded-lg"></div>
          <div class="skeleton h-16 rounded-lg"></div>
          <div class="skeleton h-16 rounded-lg"></div>
        </div>
      </section>

    </div>

    <footer class="text-center text-xs text-gray-600 mt-6 pb-4">
      資料：Truth Social · 證交所 · 鉅亨網 · Yahoo 股市　|　翻譯：Google Translate　|　僅供參考，非投資建議
    </footer>
  </main>

  <!-- ============== STOCK DETAIL MODAL ============== -->
  <div id="stock-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-4 modal-backdrop">
    <div class="bg-panel border border-border rounded-xl w-full max-w-4xl max-h-[95vh] overflow-hidden flex flex-col">
      <div class="px-4 py-3 border-b border-border flex items-center justify-between gap-2">
        <div class="min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <span id="modal-symbol" class="text-xs font-mono text-gray-400"></span>
            <h2 id="modal-name" class="text-lg font-bold truncate"></h2>
            <span id="modal-price" class="font-mono"></span>
            <span id="modal-change" class="text-sm font-mono"></span>
          </div>
          <div id="modal-kd-alert" class="hidden mt-1.5">
            <span class="alert-glow inline-flex items-center gap-1 bg-up/20 border border-up/50 text-up text-xs font-bold px-2 py-0.5 rounded">
              ⚡ 可入場提醒：K 值在 20~35 低檔區
            </span>
          </div>
        </div>
        <button id="modal-close" class="text-gray-400 hover:text-white text-2xl leading-none px-2">×</button>
      </div>

      <div class="flex-1 overflow-y-auto scroll-area p-4 space-y-4">
        <!-- Tabs -->
        <div class="flex gap-1 bg-bg/50 rounded-lg p-1 w-fit">
          <button data-range="intraday" class="range-btn px-3 py-1 text-xs rounded font-medium bg-accent text-white">當日</button>
          <button data-range="threeDay" class="range-btn px-3 py-1 text-xs rounded font-medium text-gray-400">3 日</button>
          <button data-range="fiveDay" class="range-btn px-3 py-1 text-xs rounded font-medium text-gray-400">5 日</button>
          <button data-range="fifteenDay" class="range-btn px-3 py-1 text-xs rounded font-medium text-gray-400">15 日</button>
        </div>

        <!-- Price chart -->
        <div class="bg-bg/40 rounded-lg p-3">
          <div class="text-xs text-gray-400 mb-2">價格走勢</div>
          <div class="relative" style="height: 240px;"><canvas id="price-chart"></canvas></div>
        </div>

        <!-- KD chart -->
        <div class="bg-bg/40 rounded-lg p-3">
          <div class="flex items-center justify-between mb-2">
            <div class="text-xs text-gray-400">KD 指標（9 日）</div>
            <div class="text-[10px] text-gray-500 flex gap-2">
              <span><span class="inline-block w-2 h-2 bg-yellow-400 rounded-full mr-1"></span>K</span>
              <span><span class="inline-block w-2 h-2 bg-purple-400 rounded-full mr-1"></span>D</span>
            </div>
          </div>
          <div class="relative" style="height: 160px;"><canvas id="kd-chart"></canvas></div>
        </div>

        <!-- Related stocks -->
        <div>
          <h3 class="text-sm font-semibold mb-2 text-gray-300">📌 其他熱門股票</h3>
          <div id="related-stocks" class="grid grid-cols-2 sm:grid-cols-3 gap-2"></div>
        </div>

        <!-- Related news -->
        <div>
          <h3 class="text-sm font-semibold mb-2 text-gray-300">📰 相關新聞</h3>
          <div id="related-news" class="space-y-2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============== TERM MODAL ============== -->
  <div id="term-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-backdrop">
    <div class="bg-panel border border-border rounded-xl w-full max-w-md p-5">
      <div class="flex items-start justify-between mb-3">
        <h2 id="term-title" class="text-lg font-bold"></h2>
        <button id="term-close" class="text-gray-400 hover:text-white text-2xl leading-none">×</button>
      </div>
      <p id="term-body" class="text-sm text-gray-300 leading-relaxed whitespace-pre-line"></p>
    </div>
  </div>

  <script>
    // ====================================================
    // 1. 工具函式
    // ====================================================
    const $ = (s) => document.querySelector(s);
    const $$ = (s) => document.querySelectorAll(s);

    function timeAgo(date) {
      const sec = Math.floor((Date.now() - new Date(date).getTime()) / 1000);
      if (sec < 60) return sec + ' 秒前';
      const m = Math.floor(sec / 60);
      if (m < 60) return m + ' 分鐘前';
      const h = Math.floor(m / 60);
      if (h < 24) return h + ' 小時前';
      return Math.floor(h / 24) + ' 天前';
    }

    function formatNum(n, d = 2) {
      if (n == null || isNaN(n)) return '—';
      return Number(n).toLocaleString('zh-TW', { minimumFractionDigits: d, maximumFractionDigits: d });
    }

    function colorByChange(n) {
      if (n > 0) return 'text-up';
      if (n < 0) return 'text-down';
      return 'text-gray-400';
    }

    function sign(n) {
      return n > 0 ? '+' : '';
    }

    function arrow(n) {
      return n > 0 ? '▲' : n < 0 ? '▼' : '─';
    }

    function isMarketOpen() {
      const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
      const day = now.getDay();
      if (day === 0 || day === 6) return false;
      const m = now.getHours() * 60 + now.getMinutes();
      return m >= 9 * 60 && m <= 13 * 60 + 30;
    }

    function updateClock() {
      const now = new Date();
      $('#clock').textContent = now.toLocaleTimeString('zh-TW', {
        timeZone: 'Asia/Taipei', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
      }) + ' (台北)';
      const open = isMarketOpen();
      $('#market-dot').style.background = open ? '#10b981' : '#6b7280';
      $('#market-dot').style.animation = open ? '' : 'none';
      $('#market-status').textContent = open ? '台股盤中' : '台股休市';
      $('#market-status').className = open ? 'text-emerald-400' : 'text-gray-500';
      updateTimeline();
    }

    // 市場時間軸進度線（盤前 → 盤中 → 盤後）
    function updateTimeline() {
      const tw = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Taipei' }));
      const day = tw.getDay();
      const minutes = tw.getHours() * 60 + tw.getMinutes() + tw.getSeconds() / 60;
      const OPEN = 9 * 60;        // 09:00
      const CLOSE = 13 * 60 + 30; // 13:30
      const status = $('#timeline-status');
      const progress = $('#timeline-progress');
      const pre = $('#timeline-pre');
      const post = $('#timeline-post');

      if (day === 0 || day === 6) {
        pre.style.width = '50%'; pre.style.background = 'rgba(75,85,99,0.4)';
        post.style.width = '50%'; post.style.background = 'rgba(75,85,99,0.4)';
        progress.style.width = '0%';
        status.textContent = '週末休市';
        status.className = 'text-gray-500 shrink-0 min-w-16 text-right font-medium';
      } else if (minutes < OPEN) {
        // 盤前
        pre.style.width = '100%'; pre.style.background = 'rgba(251,191,36,0.25)';
        post.style.width = '0%';
        progress.style.width = '0%';
        const minLeft = Math.round(OPEN - minutes);
        const hh = Math.floor(minLeft / 60), mm = minLeft % 60;
        status.textContent = `盤前 ${hh > 0 ? hh + 'h' : ''}${mm}m`;
        status.className = 'text-amber-400 shrink-0 min-w-16 text-right font-medium';
      } else if (minutes > CLOSE) {
        // 盤後
        pre.style.width = '0%';
        progress.style.width = '100%';
        progress.style.background = 'rgba(75,85,99,0.5)';
        post.style.width = '0%';
        status.textContent = '盤後';
        status.className = 'text-gray-400 shrink-0 min-w-16 text-right font-medium';
      } else {
        // 盤中
        const pct = ((minutes - OPEN) / (CLOSE - OPEN)) * 100;
        pre.style.width = '0%';
        progress.style.left = '0%';
        progress.style.width = pct + '%';
        progress.style.background = 'rgba(16,185,129,0.7)';
        post.style.width = (100 - pct) + '%';
        post.style.background = 'rgba(75,85,99,0.2)';
        status.textContent = `盤中 ${Math.round(pct)}%`;
        status.className = 'text-emerald-400 shrink-0 min-w-16 text-right font-medium';
      }
    }

    setInterval(updateClock, 1000);
    updateClock();

    // ====================================================
    // 2. 術語字典（離線資料）
    // ====================================================
    const GLOSSARY = {
      '加權指數': '台灣加權股價指數（TAIEX），是反映台灣股市整體走勢的指標，以 1966 年為基期，基期值為 100。所有上市股票按市值加權計算。',
      '櫃買指數': '反映台灣上櫃股票整體走勢的指標，相當於上市的加權指數，但範圍是上櫃市場（OTC）。',
      '三大法人': '指外資、投信、自營商三類機構投資人，他們的買賣超數據常被視為市場資金動向參考。',
      '外資': '境外機構投資者，例如海外基金、退休基金。在台股交易量佔比很高，買超／賣超對股價影響大。',
      '投信': '證券投資信託公司，操作共同基金的法人。台灣本土，常被稱為「國家隊」之一。',
      '自營商': '券商自營部門，用券商自己的錢進行投資操作的單位。',
      '殖利率': '現金股利／股價 × 100%，用來衡量股票每年可以帶來多少現金流相對於股價的比例。',
      '本益比': '英文 PE Ratio。股價 ÷ 每股盈餘（EPS）。數字越低表示越「便宜」（相對於賺的錢）。',
      '股價淨值比': '英文 PB Ratio。股價 ÷ 每股淨值。低於 1 通常表示市值低於公司帳面價值。',
      'EPS': '每股盈餘（Earnings Per Share）= 公司稅後淨利 ÷ 流通股數。是衡量公司獲利能力的核心指標。',
      'KD': '隨機指標（Stochastic Oscillator）。常用週期 9。\n• K < 20：超賣，可能反彈\n• K > 80：超買，可能回檔\n• K 由下往上穿越 D：黃金交叉（買訊）\n• K 由上往下穿越 D：死亡交叉（賣訊）',
      'RSI': '相對強弱指標（Relative Strength Index）。範圍 0~100，常用 14 日。\n• RSI < 30：超賣\n• RSI > 70：超買',
      'MACD': '指數平滑異同移動平均線。由 DIF（短期 - 長期 EMA）、MACD（DIF 的 EMA）、柱狀圖三部分組成，用來判斷趨勢轉折。',
      '布林通道': 'Bollinger Bands。由中軌（移動平均）+ 上下軌（標準差）構成，用來判斷股價偏離常態的程度。',
      '黃金交叉': '短期均線（或指標）由下往上穿越長期線，視為買進訊號。',
      '死亡交叉': '短期均線（或指標）由上往下跌破長期線，視為賣出訊號。',
      '成交量': '一段時間內買賣成交的股數總和，反映市場熱度。',
      '成交額': '成交量 × 成交價，以金額表示市場活絡程度。',
      'ETF': 'Exchange Traded Fund，指數股票型基金。可以像股票一樣買賣，但內含一籃子股票，例如 0050 追蹤台灣 50 指數。',
      '0050': '元大台灣 50 ETF，追蹤台灣前 50 大上市公司股價表現，是台灣最具代表性的 ETF。',
      '0056': '元大高股息 ETF，挑選殖利率較高的股票組成，適合領息族。',
      '權值股': '在加權指數中佔比較大的股票，通常是市值大的公司。台積電（2330）約佔加權指數 35% 左右。',
      '護國神山': '對台積電的暱稱，因其在台股市值與全球半導體地位均極具影響力。',
      '上市': '在台灣證券交易所（TWSE）掛牌交易的股票，門檻較高。',
      '上櫃': '在證券櫃檯買賣中心（TPEx）掛牌的股票，相對門檻較低。',
      '興櫃': '進入上櫃前的暫掛市場。',
      '當沖': '當日沖銷，當天買進當天賣出（或反之），不持有至隔日。',

      '多頭': '預期股價上漲的方向／看多者。「做多」即買進等漲。',

    function showTerm(name, def) {
      $('#term-title').textContent = name;
      $('#term-body').textContent = def;
      $('#term-modal').classList.remove('hidden');
    }
    $('#term-close').addEventListener('click', () => $('#term-modal').classList.add('hidden'));
    $('#term-modal').addEventListener('click', (e) => { if (e.target.id === 'term-modal') $('#term-modal').classList.add('hidden'); });

    // 術語搜尋
    $('#term-search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      const box = $('#term-results');
      if (!q) { box.classList.add('hidden'); return; }
      const matches = Object.entries(GLOSSARY)
        .filter(([k, v]) => k.toLowerCase().includes(q) || v.toLowerCase().includes(q))
        .slice(0, 12);
      if (matches.length === 0) {
        box.innerHTML = `<div class="p-3 text-xs text-gray-500">沒有找到「${q}」相關術語</div>`;
      } else {
        box.innerHTML = matches.map(([k, v]) => `
          <button class="term-item w-full text-left px-3 py-2 hover:bg-bg/60 border-b border-border/50 last:border-0" data-term="${encodeURIComponent(k)}">
            <div class="text-sm font-medium">${k}</div>
            <div class="text-[11px] text-gray-400 truncate">${v.split('\n')[0]}</div>
          </button>
        `).join('');
        box.querySelectorAll('.term-item').forEach((btn) => {
          btn.addEventListener('click', () => {
            const k = decodeURIComponent(btn.dataset.term);
            showTerm(k, GLOSSARY[k]);
            box.classList.add('hidden');
            $('#term-search').value = '';
          });
        });
      }
      box.classList.remove('hidden');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('#term-search') && !e.target.closest('#term-results')) $('#term-results').classList.add('hidden');
      if (!e.target.closest('#stock-search') && !e.target.closest('#stock-results')) $('#stock-results').classList.add('hidden');
    });

    // ====================================================
    // 3. 股票模糊搜尋
    // ====================================================
    let stockList = [];

    async function loadStockList() {
      try {
        const res = await fetch('/.netlify/functions/stock-list');
        const data = await res.json();
        stockList = data.stocks || [];
      } catch {}
    }

    $('#stock-search').addEventListener('input', (e) => {
      const q = e.target.value.trim().toLowerCase();
      const box = $('#stock-results');
      if (!q || stockList.length === 0) { box.classList.add('hidden'); return; }
      const matches = stockList
        .filter((s) => s.symbol.toLowerCase().includes(q) || s.name.toLowerCase().includes(q))
        .slice(0, 15);
      if (matches.length === 0) {
        box.innerHTML = `<div class="p-3 text-xs text-gray-500">沒有找到「${q}」相關股票或 ETF</div>`;
      } else {
        box.innerHTML = matches.map((s) => `
          <button class="stock-item w-full text-left px-3 py-2 hover:bg-bg/60 border-b border-border/50 last:border-0 flex items-center justify-between gap-2" data-symbol="${s.symbol}" data-name="${s.name}" data-market="${s.market}">
            <div class="flex items-center gap-2 min-w-0">
              <span class="text-xs font-mono text-gray-400 shrink-0">${s.symbol}</span>
              <span class="text-sm truncate">${s.name}</span>
            </div>
            <span class="text-[10px] text-gray-500 shrink-0">${s.market}</span>
          </button>
        `).join('');
        box.querySelectorAll('.stock-item').forEach((btn) => {
          btn.addEventListener('click', () => {
            openStockModal(btn.dataset.symbol, btn.dataset.name, btn.dataset.market);
            box.classList.add('hidden');
            $('#stock-search').value = '';
          });
        });

    // ====================================================
    // 4. Tab 切換（手機）
    // ====================================================
    $$('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        $$('.tab-btn').forEach((b) => {
          b.classList.remove('border-accent', 'text-accent');
          b.classList.add('border-transparent', 'text-gray-400');
        });
        btn.classList.add('border-accent', 'text-accent');
        btn.classList.remove('border-transparent', 'text-gray-400');
        $$('.panel').forEach((p) => {
          if (p.dataset.panel === tab) p.classList.remove('hidden');
          else if (window.innerWidth < 768) p.classList.add('hidden');
        });
      });

    // ====================================================
    // 5. Trump 推文 + 翻譯
    // ====================================================
    const transCache = new Map(); // postId -> 中文
    let trumpPosts = [];

    async function loadTrump() {
      try {
        const res = await fetch('/.netlify/functions/trump-posts');
        const data = await res.json();
        const feed = $('#trump-feed');
        if (!data.posts || data.posts.length === 0) {
          // 全部來源失敗時，自動 fallback 為嵌入官方頁面（無翻譯）
          feed.innerHTML = `
            <div class="text-[11px] text-amber-400/90 bg-amber-500/10 border border-amber-500/30 rounded p-2 mb-2">
              ⚠️ API 暫時無法存取，已切換為嵌入模式（中文翻譯停用）。<br />
              <span class="text-gray-400 text-[10px]">${data.error || '所有來源失敗'}</span>
            </div>
            <div class="bg-bg/50 rounded-lg p-2 border border-border/50">
              <iframe src="https://truthsocial.com/@realDonaldTrump/embed"
                      style="width:100%; height: 600px; border:0; border-radius: 6px; background:#fff;"
                      sandbox="allow-scripts allow-same-origin allow-popups"
                      loading="lazy"></iframe>
              <div class="mt-2 text-center">
                <a href="https://truthsocial.com/@realDonaldTrump" target="_blank" rel="noopener"
                   class="text-xs text-accent hover:underline">於 Truth Social 開啟完整頁面 →</a>
              </div>
            </div>`;
          return;
        }
        trumpPosts = data.posts;
        renderTrump();
        $('#trump-updated').textContent = '更新：' + new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
        // 嘗試把沒翻譯的補上
        translateMissing();
      } catch (err) {
        $('#trump-feed').innerHTML = `<div class="text-center text-red-400 py-8 text-sm">載入失敗：${err.message}</div>`;
      }
    }

    function renderTrump() {
      const showTrans = $('#trans-toggle').checked;
      $('#trump-feed').innerHTML = trumpPosts.map((post) => {
        const trans = transCache.get(post.id);
        return `
          <article class="bg-bg/50 rounded-lg p-3 border border-border/50 hover:border-border transition">
            <div class="flex items-center justify-between mb-2">
              <span class="text-xs text-gray-400">@realDonaldTrump</span>
              <span class="text-[10px] text-gray-500">${timeAgo(post.created_at)}</span>
            </div>
            <div class="text-sm leading-relaxed text-gray-200 break-words">${post.content}</div>
            ${showTrans && trans ? `
              <div class="text-sm leading-relaxed text-emerald-300/90 break-words mt-2 pt-2 border-t border-border/50">
                <span class="text-[10px] text-emerald-500 mr-1">中譯</span>${trans}
              </div>
            ` : showTrans && post.content && !trans ? `
              <div class="text-xs text-gray-500 mt-2 pt-2 border-t border-border/50">翻譯中...</div>
            ` : ''}
            ${post.media && post.media.length ? `
              <div class="mt-2 grid gap-2 ${post.media.length > 1 ? 'grid-cols-2' : ''}">
                ${post.media.map(m => `<img src="${m}" class="rounded-md w-full max-h-64 object-cover" loading="lazy" />`).join('')}
              </div>
            ` : ''}
            ${post.url ? `<a href="${post.url}" target="_blank" rel="noopener" class="text-[11px] text-accent hover:underline mt-2 inline-block">於 Truth Social 開啟 →</a>` : ''}
          </article>
        `;
      }).join('');
    }

    async function translateMissing() {
      if (!$('#trans-toggle').checked) return;
      const need = trumpPosts.filter((p) => p.content && !transCache.has(p.id));
      if (need.length === 0) return;
      try {
        const res = await fetch('/.netlify/functions/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ texts: need.map((p) => p.content), target: 'zh-TW' }),
        });
        const data = await res.json();
        (data.translations || []).forEach((t, i) => transCache.set(need[i].id, t));
        renderTrump();
      } catch {}
    }

    $('#trans-toggle').addEventListener('change', () => {
      renderTrump();
      translateMissing();
    });

    // ====================================================
    // 6. 大盤資訊
    // ====================================================
    let topVolumeStocks = [];

    async function loadMarket() {
      try {
        const res = await fetch('/.netlify/functions/market-overview');
        const data = await res.json();
        topVolumeStocks = data.topVolume || [];

        const wrap = $('#market-content');
        const parts = [];

        // 加權指數卡片
        if (data.taiex) {
          const t = data.taiex;
          const colorClass = colorByChange(t.change);
          parts.push(`
            <div class="bg-gradient-to-br from-accent/10 to-bg/50 rounded-lg p-4 border border-accent/30">
              <div class="text-xs text-gray-400 mb-1">加權指數 TAIEX</div>
              <div class="text-2xl font-bold tabular-nums">${formatNum(t.value, 2)}</div>
              <div class="${colorClass} text-sm font-mono mt-1">${arrow(t.change)} ${sign(t.change)}${formatNum(t.change, 2)}（${sign(t.changePercent)}${formatNum(t.changePercent, 2)}%）</div>
            </div>
          `);
        }

        // 成交量前十（往上移）
        if (topVolumeStocks.length > 0) {
          parts.push(`
            <div class="bg-bg/50 rounded-lg p-3 border border-border/50">
              <div class="text-xs font-medium text-gray-300 mb-2">當日成交量前十名</div>
              <div class="space-y-1">
                ${topVolumeStocks.map((s, i) => `
                  <div class="flex items-center gap-2 py-1 text-xs">
                    <span class="text-gray-500 font-mono w-5">${i + 1}.</span>
                    <button class="stock-link flex-1 text-left flex items-center gap-2" data-symbol="${s.symbol}" data-name="${s.name}">
                      <span class="font-mono text-gray-400 w-12 shrink-0">${s.symbol}</span>
                      <span class="truncate">${s.name}</span>
                    </button>
                    <span class="text-gray-400 tabular-nums">${formatNum(s.price, 2)}</span>
                    <span class="${colorByChange(s.change)} font-mono w-16 text-right">${sign(s.change)}${formatNum(s.change, 2)}</span>
                  </div>
                `).join('')}
              </div>
            </div>
          `);
        }

        // 類股漲跌（可點擊展開成份股）
        if (data.sectors && data.sectors.length > 0) {
          const list = [...data.sectors].sort((a, b) => b.changePercent - a.changePercent);
          parts.push(`
            <div class="bg-bg/50 rounded-lg p-3 border border-border/50">
              <div class="text-xs font-medium text-gray-300 mb-2">類股漲跌 <span class="text-gray-500 font-normal">（點擊查看前 5 名）</span></div>
              <div class="space-y-0.5 text-xs">
                ${list.map((s) => `
                  <div class="sector-row" data-sector="${encodeURIComponent(s.name)}">
                    <button class="sector-btn w-full flex justify-between items-center py-1 px-1.5 rounded hover:bg-bg/60 transition">
                      <span class="text-gray-300 flex items-center gap-1"><span class="caret text-[10px] text-gray-500">▶</span> ${s.name}</span>
                      <span class="${colorByChange(s.changePercent)} font-mono">${arrow(s.changePercent)} ${sign(s.changePercent)}${formatNum(s.changePercent, 2)}%</span>
                    </button>
                    <div class="sector-content hidden mt-1 mb-1 ml-3 pl-2 border-l-2 border-accent/30 space-y-1"></div>
                  </div>
                `).join('')}
              </div>
            </div>
          `);
        }

        if (parts.length === 0) {
          wrap.innerHTML = `<div class="text-center text-gray-500 py-8 text-sm">${data.error || '暫無大盤資料'}</div>`;
        } else {
          if (data.date) parts.unshift(`<div class="text-xs text-gray-400">資料日期：${data.date}</div>`);
          wrap.innerHTML = parts.join('');
          // 綁定股票連結（top volume 全為上市股票）
          wrap.querySelectorAll('.stock-link').forEach((btn) => {
            btn.addEventListener('click', () => openStockModal(btn.dataset.symbol, btn.dataset.name, '上市'));
          });
          // 綁定類股展開
          wrap.querySelectorAll('.sector-row').forEach((row) => {
            const btn = row.querySelector('.sector-btn');
            const content = row.querySelector('.sector-content');
            const caret = row.querySelector('.caret');
            btn.addEventListener('click', async () => {
              const isOpen = !content.classList.contains('hidden');
              if (isOpen) {
                content.classList.add('hidden');
                if (caret) caret.textContent = '▶';
                return;
              }
              if (caret) caret.textContent = '▼';
              content.classList.remove('hidden');
              if (content.dataset.loaded !== '1') {
                content.innerHTML = '<div class="text-gray-500 py-1">載入中...</div>';
                const sectorName = decodeURIComponent(row.dataset.sector);
                try {
                  const r = await fetch(`/.netlify/functions/sector-stocks?sector=${encodeURIComponent(sectorName)}`);
                  const sd = await r.json();
                  if (!sd.stocks || sd.stocks.length === 0) {
                    content.innerHTML = `<div class="text-gray-500 py-1">${sd.error || '無成份股資料'}</div>`;
                    return;
                  }
                  content.innerHTML = sd.stocks.map((s) => `
                    <button class="sector-stock-link w-full flex items-center justify-between py-1 px-1 rounded hover:bg-accent/10 transition" data-symbol="${s.symbol}" data-name="${s.name}">
                      <span class="flex items-center gap-1.5 min-w-0">
                        <span class="font-mono text-gray-500 text-[10px] shrink-0">${s.symbol}</span>
                        <span class="text-gray-200 truncate">${s.name}</span>
                      </span>
                      <span class="${colorByChange(s.change)} font-mono text-[10px] shrink-0">${sign(s.change)}${formatNum(s.change, 2)}</span>
                    </button>
                  `).join('');
                  content.querySelectorAll('.sector-stock-link').forEach((b) => {
                    b.addEventListener('click', () => openStockModal(b.dataset.symbol, b.dataset.name, '上市'));
                  });
                  content.dataset.loaded = '1';
                } catch (err) {
                  content.innerHTML = `<div class="text-red-400 py-1">載入失敗：${err.message}</div>`;
                }
              }
            });
          });
        }
        $('#market-updated').textContent = '更新：' + new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
      } catch (err) {
        $('#market-content').innerHTML = `<div class="text-center text-red-400 py-8 text-sm">載入失敗：${err.message}</div>`;
      }
    }

    // ====================================================
    // 8. 股票詳情視窗
    // ====================================================
    let priceChart = null, kdChart = null;
    let currentStockData = null;
    let currentRange = 'intraday';

    function closeStockModal() {
      $('#stock-modal').classList.add('hidden');
      if (priceChart) { priceChart.destroy(); priceChart = null; }
      if (kdChart) { kdChart.destroy(); kdChart = null; }
    }
    $('#modal-close').addEventListener('click', closeStockModal);
    $('#stock-modal').addEventListener('click', (e) => { if (e.target.id === 'stock-modal') closeStockModal(); });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeStockModal();
        $('#term-modal').classList.add('hidden');
      }
    });

    async function openStockModal(symbol, name, market = '上市') {
      $('#stock-modal').classList.remove('hidden');
      $('#modal-symbol').textContent = symbol;
      $('#modal-name').textContent = name;
      $('#modal-price').textContent = '';
      $('#modal-change').textContent = '';
      $('#modal-kd-alert').classList.add('hidden');
      $('#related-stocks').innerHTML = '<div class="text-xs text-gray-500 col-span-full">載入中...</div>';
      $('#related-news').innerHTML = '<div class="text-xs text-gray-500">載入中...</div>';

      // 同時呼叫 stock-detail 與 stock-news（帶 market 區分上市/上櫃）
      const params = `symbol=${encodeURIComponent(symbol)}&market=${encodeURIComponent(market)}`;
      const [detail, news] = await Promise.all([
        fetch(`/.netlify/functions/stock-detail?${params}`).then((r) => r.json()).catch(() => null),
        fetch(`/.netlify/functions/stock-news?${params}&name=${encodeURIComponent(name)}`).then((r) => r.json()).catch(() => null),
      ]);

      if (!detail || detail.error) {
        $('#related-stocks').innerHTML = '';
        $('#related-news').innerHTML = `<div class="text-xs text-red-400">無法載入資料：${detail?.error || '未知錯誤'}</div>`;
        return;
      }

      currentStockData = detail;
      // 顯示當前價與漲跌
      const last = detail.intraday || detail.fifteenDay || detail.fiveDay;
      const closes = (last?.close || []).filter((v) => v != null);
      const lastPrice = closes[closes.length - 1];
      const prevClose = detail.previousClose;
      const change = lastPrice && prevClose ? lastPrice - prevClose : 0;
      const changePct = prevClose ? (change / prevClose) * 100 : 0;
      $('#modal-price').textContent = lastPrice != null ? formatNum(lastPrice, 2) : '—';
      $('#modal-change').textContent = lastPrice != null ? `${arrow(change)} ${sign(change)}${formatNum(change, 2)} (${sign(changePct)}${formatNum(changePct, 2)}%)` : '';
      $('#modal-change').className = `text-sm font-mono ${colorByChange(change)}`;

      // KD 提醒
      if (detail.kd && detail.kd.alert) {
        $('#modal-kd-alert').classList.remove('hidden');
      }

      // 渲染圖表
      currentRange = 'intraday';
      $$('.range-btn').forEach((b) => {
        if (b.dataset.range === 'intraday') {
          b.classList.add('bg-accent', 'text-white');
          b.classList.remove('text-gray-400');
        } else {
          b.classList.remove('bg-accent', 'text-white');
          b.classList.add('text-gray-400');
        }
      });
      renderPriceChart();
      renderKDChart();

      // 相關股票（其他熱門）
      const related = topVolumeStocks.filter((s) => s.symbol !== symbol).slice(0, 9);
      $('#related-stocks').innerHTML = related.length === 0 ? '<div class="text-xs text-gray-500 col-span-full">尚無資料（請等大盤資料載入後重試）</div>' : related.map((s) => `
        <button class="stock-link bg-bg/50 hover:bg-bg/80 border border-border/50 hover:border-accent/50 rounded p-2 text-left transition" data-symbol="${s.symbol}" data-name="${s.name}">
          <div class="text-[10px] font-mono text-gray-400">${s.symbol}</div>
          <div class="text-sm truncate">${s.name}</div>
          <div class="text-[10px] ${colorByChange(s.change)} font-mono">${sign(s.change)}${formatNum(s.change, 2)}</div>
        </button>
      `).join('');
      $('#related-stocks').querySelectorAll('.stock-link').forEach((b) => {
        b.addEventListener('click', () => openStockModal(b.dataset.symbol, b.dataset.name, '上市'));
      });

      // 相關新聞
      const newsItems = news?.news || [];
      $('#related-news').innerHTML = newsItems.length === 0 ? '<div class="text-xs text-gray-500">暫無相關新聞</div>' : newsItems.slice(0, 15).map((it) => `
        <a href="${it.url}" target="_blank" rel="noopener" class="block bg-bg/50 rounded-lg p-2 border border-border/50 hover:border-accent/50 transition">
          <div class="flex justify-between items-start gap-2 mb-1">
            <span class="text-[10px] text-gray-500">${it.source || ''}</span>
            <span class="text-[10px] text-gray-500 shrink-0">${timeAgo(it.publishedAt)}</span>
          </div>
          <h4 class="text-sm font-medium leading-snug">${it.title}</h4>
          ${it.summary ? `<p class="text-xs text-gray-400 mt-1 line-clamp-2">${it.summary}</p>` : ''}
        </a>
      `).join('');
    }

    function renderPriceChart() {
      if (!currentStockData) return;
      const data = currentStockData[currentRange];
      if (!data || !data.close || data.close.length === 0) {
        if (priceChart) { priceChart.destroy(); priceChart = null; }
        return;
      }
      const labels = data.timestamps.map((t) => {
        const d = new Date(t);
        if (currentRange === 'intraday') {
          return d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
        }
        return d.toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });
      });
      const closes = data.close;
      // 顏色：尾大頭小=紅、頭大尾小=綠
      const first = closes.find((v) => v != null) || 0;
      const last = [...closes].reverse().find((v) => v != null) || 0;
      const color = last > first ? '#ef4444' : last < first ? '#10b981' : '#9ca3af';

      if (priceChart) priceChart.destroy();
      const ctx = $('#price-chart').getContext('2d');
      priceChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: closes,
            borderColor: color,
            backgroundColor: color + '20',
            fill: true,
            tension: 0.2,
            pointRadius: 0,
            pointHoverRadius: 4,
            spanGaps: true,
          }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
          scales: {
            x: { ticks: { color: '#9ca3af', maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { color: '#1f2937' } },
            y: { ticks: { color: '#9ca3af' }, grid: { color: '#1f2937' } },
          },
        },
      });
    }

    function renderKDChart() {
      if (!currentStockData?.kd?.k || currentStockData.kd.k.length === 0) {
        if (kdChart) { kdChart.destroy(); kdChart = null; }
        return;
      }
      const kd = currentStockData.kd;
      const daily = currentStockData.fifteenDay;
      const labels = daily ? daily.timestamps.map((t) => new Date(t).toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' })) : kd.k.map((_, i) => i + 1);
      if (kdChart) kdChart.destroy();
      const ctx = $('#kd-chart').getContext('2d');
      kdChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'K', data: kd.k, borderColor: '#facc15', backgroundColor: 'transparent', tension: 0.2, pointRadius: 2, spanGaps: true },
            { label: 'D', data: kd.d, borderColor: '#a78bfa', backgroundColor: 'transparent', tension: 0.2, pointRadius: 2, spanGaps: true },
          ],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { mode: 'index', intersect: false },
          },
          scales: {
            x: { ticks: { color: '#9ca3af', maxRotation: 0, autoSkip: true, maxTicksLimit: 8 }, grid: { color: '#1f2937' } },
            y: { min: 0, max: 100, ticks: { color: '#9ca3af', stepSize: 20 }, grid: { color: '#1f2937' } },
          },
        },
      });
    }

    $$('.range-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        currentRange = btn.dataset.range;
        $$('.range-btn').forEach((b) => {
          if (b === btn) { b.classList.add('bg-accent', 'text-white'); b.classList.remove('text-gray-400'); }
          else { b.classList.remove('bg-accent', 'text-white'); b.classList.add('text-gray-400'); }
        });
        renderPriceChart();
      });
    });

    // ====================================================
    // 9. 智慧輪詢
    // ====================================================
    let trumpTimer, marketTimer, newsTimer;
    function schedulePolling() {
      const open = isMarketOpen();
      clearInterval(marketTimer); clearInterval(newsTimer);
      marketTimer = setInterval(loadMarket, open ? 30 * 1000 : 5 * 60 * 1000);
      newsTimer = setInterval(loadNews, open ? 5 * 60 * 1000 : 15 * 60 * 1000);
    }

    // 啟動
    loadStockList();
    loadTrump(); loadMarket(); loadNews();
    trumpTimer = setInterval(loadTrump, 60 * 1000);
    schedulePolling();
    setInterval(schedulePolling, 60 * 1000);

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) { loadTrump(); loadMarket(); loadNews(); }
    });
  </script>
</body>
</html>
